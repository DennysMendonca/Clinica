<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Pacientes - Clínica Odontológica</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="logo-container">
        <img src="https://static.vecteezy.com/system/resources/previews/005/495/317/non_2x/dental-clinic-logo-template-dental-care-logo-designs-tooth-teeth-smile-dentist-logo-vector.jpg" alt="Logo da Clínica" class="clinica-logo">
    </div>

    <div class="container">
        <h2>Ficha de Cadastro Odontológico</h2>
        <form id="formCadastro">
            
            <section>
                <h3>1. Dados Pessoais</h3>
                <div class="form-group">
                    <label for="nome">Nome Completo *</label>
                    <input type="text" id="nome" name="nome" required>
                </div>
                
                <div class="grid-2">
                    <div class="form-group">
                        <label for="nascimento">Data de Nascimento *</label>
                        <input type="date" id="nascimento" name="nascimento" required>
                    </div>
                    <div class="form-group">
                        <label for="cpf">CPF</label>
                        <input type="text" id="cpf" maxlength="14" placeholder="000.000.000-00">
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label for="telefone">Telefone Celular *</label>
                        <input type="text" id="telefone" required maxlength="15" placeholder="(00) 00000-0000">
                    </div>
                    <div class="form-group">
                        <label for="email">E-mail</label>
                        <input type="email" id="email">
                    </div>
                </div>

                <div class="form-group">
                    <label for="endereco">Endereço Completo *</label>
                    <input type="text" id="endereco" required>
                </div>
            </section>

            <section>
                <h3>2. Histórico de Saúde</h3>
                <label>Possui ou já teve alguma das condições abaixo?</label>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="doenca" value="Diabetes"> Diabetes</label>
                    <label><input type="checkbox" name="doenca" value="Hipertensão"> Hipertensão</label>
                    <label><input type="checkbox" name="doenca" value="Cardiopatia"> Cardiopatia</label>
                    <label><input type="checkbox" id="chkOutros"> Outros</label>
                </div>

                <div id="campoOutros" class="hidden">
                    <label for="outras_enfermidades">Especifique:</label>
                    <input type="text" id="outras_enfermidades">
                </div>

                <div class="form-group" style="margin-top: 15px;">
                    <label>Possui alguma alergia?</label>
                    <select id="selectAlergia">
                        <option value="nao">Não</option>
                        <option value="sim">Sim</option>
                    </select>
                </div>

                <div id="campoAlergia" class="hidden">
                    <label for="alergia_desc">Descreva a alergia:</label>
                    <textarea id="alergia_desc" rows="2"></textarea>
                </div>
            </section>

            <section class="lgpd-box">
                <label>
                    <input type="checkbox" id="lgpd" required>
                    Confirmo e consinto com o tratamento dos meus dados para fins clínicos (LGPD). *
                </label>
            </section>

            <div class="actions">
                <button type="submit" class="btn-submit">Finalizar Cadastro</button>
                <button type="button" class="btn-print" onclick="window.print()">Imprimir / Salvar PDF</button>
            </div>
        </form>
    </div>

    <div id="modalConfirmacao" class="modal-overlay">
        <div class="modal-content">
            <div class="success-icon">✓</div>
            <h2>Cadastro Concluído!</h2>
            <p>Os dados foram validados e registrados com sucesso.</p>
            <button onclick="fecharModal()" class="btn-submit">Ok, entendi</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
